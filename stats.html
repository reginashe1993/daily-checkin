<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>成长总结</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f7f6f2; --surface: #ffffff; --border: #e4e2da;
    --text: #1a1a18; --muted: #888780; --hint: #b4b2a9;
    --purple: #534AB7; --purple-light: #EEEDFE; --purple-text: #3C3489;
    --teal: #1D9E75; --teal-light: #E1F5EE; --teal-text: #085041;
    --radius: 10px; --radius-sm: 6px;
  }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 15px; line-height: 1.5; min-height: 100vh; }
  .shell { max-width: 520px; margin: 0 auto; padding: 24px 16px 80px; }
  .header { margin-bottom: 20px; }
  .header-title { font-size: 22px; font-weight: 600; letter-spacing: -0.3px; }
  .header-sub { font-size: 12px; color: var(--muted); margin-top: 3px; }
  .nav-bar { display: flex; margin-bottom: 24px; border: 1px solid var(--border); border-radius: var(--radius-sm); overflow: hidden; }
  .nav-btn { flex: 1; padding: 9px; font-size: 13px; text-align: center; background: var(--surface); color: var(--muted); text-decoration: none; display: block; }
  .nav-btn.active { background: var(--purple-light); color: var(--purple); font-weight: 500; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; }
  .card-label { font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--hint); margin-bottom: 14px; }
  .stat-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 4px; }
  .stat-box { background: var(--bg); border-radius: var(--radius-sm); padding: 12px 10px; text-align: center; }
  .stat-num { font-size: 26px; font-weight: 600; color: var(--purple); letter-spacing: -0.5px; }
  .stat-label { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .anchor-row { display: flex; flex-direction: column; gap: 12px; }
  .anchor-item { display: flex; align-items: center; gap: 12px; }
  .anchor-emoji { font-size: 18px; width: 28px; text-align: center; flex-shrink: 0; }
  .anchor-info { flex: 1; }
  .anchor-name { font-size: 13px; font-weight: 500; margin-bottom: 5px; }
  .anchor-bar-bg { height: 6px; background: var(--bg); border-radius: 3px; }
  .anchor-bar-fill { height: 6px; border-radius: 3px; transition: width 0.6s ease; }
  .anchor-pct { font-size: 11px; color: var(--muted); margin-top: 3px; }
  .day-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
  .day-tile { background: var(--bg); border-radius: var(--radius-sm); padding: 12px; }
  .day-tile-top { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .day-tile-name { font-size: 12px; font-weight: 500; }
  .day-tile-count { font-size: 24px; font-weight: 600; color: var(--purple); }
  .day-tile-sub { font-size: 11px; color: var(--muted); }
  .period-tabs { display: flex; gap: 6px; margin-bottom: 14px; }
  .period-tab { font-size: 11px; padding: 4px 10px; border-radius: 20px; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; }
  .period-tab.active { background: var(--purple); border-color: var(--purple); color: #fff; font-weight: 500; }
  .loading { text-align: center; padding: 40px 0; color: var(--muted); font-size: 13px; }
  .error-msg { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; color: #993C1D; font-size: 13px; line-height: 1.8; }
  .sync-btn { width: 100%; padding: 10px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--surface); color: var(--muted); font-size: 13px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; margin-bottom: 16px; transition: all 0.15s; }
  .sync-btn:hover { border-color: var(--purple); color: var(--purple); }
  .sync-btn:disabled { opacity: 0.5; cursor: not-allowed; }
</style>
</head>
<body>
<div class="shell">
  <div class="header">
    <div class="header-title">成长总结</div>
    <div class="header-sub" id="data-range">加载中…</div>
  </div>

  <div class="nav-bar">
    <a class="nav-btn" href="index.html">📋 每日打卡</a>
    <a class="nav-btn active" href="stats.html">📊 成长总结</a>
  </div>

  <button class="sync-btn" id="sync-btn" onclick="loadData()">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
    刷新数据
  </button>

  <div id="main-content">
    <div class="loading">正在从 Google Sheets 读取数据…</div>
  </div>
</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwW3d3EQiaKQjEWE1Abs91T06eGtYZPCS_YALuXLcfjIJrLaJBT3AhjFaDFJ3zHr4fN/exec';

let allData = [];
let charts = [];
let currentPeriod = '30';

async function loadData() {
  const btn = document.getElementById('sync-btn');
  btn.disabled = true;
  btn.textContent = '读取中…';
  document.getElementById('data-range').textContent = '加载中…';
  document.getElementById('main-content').innerHTML = '<div class="loading">正在从 Google Sheets 读取数据…</div>';
  charts.forEach(c => c.destroy());
  charts = [];

  try {
    const resp = await fetch(SCRIPT_URL, { method: 'GET' });
    const rows = await resp.json();

    if (!Array.isArray(rows) || rows.length === 0) {
      document.getElementById('data-range').textContent = '暂无数据';
      document.getElementById('main-content').innerHTML = '<div class="error-msg">还没有记录，先去每日打卡保存几条记录吧 😊</div>';
      btn.disabled = false;
      btn.innerHTML = '↻ 刷新数据';
      return;
    }

    allData = rows.map(r => ({
      date: r['日期'] || '',
      dayType: r['日类型'] || '',
      done: Number(r['完成项目数'] || 0),
      total: Number(r['总项目数'] || 0),
      pct: parseFloat((r['完成率'] || '0').toString().replace('%', '')),
      body: r['身体锚'] === '✓',
      input: r['输入锚'] === '✓',
      record: r['记录锚'] === '✓',
    })).filter(r => r.date);

    document.getElementById('data-range').textContent = `共 ${allData.length} 条记录，来自 Google Sheets`;
    renderAll();
  } catch(e) {
    document.getElementById('data-range').textContent = '读取失败';
    document.getElementById('main-content').innerHTML = `
      <div class="error-msg">
        读取失败，可能是 Apps Script 还没重新部署。<br><br>
        请确认：Extensions → Apps Script → Deploy → Manage deployments → 编辑 → New version → Deploy
      </div>`;
  }

  btn.disabled = false;
  btn.innerHTML = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg> 刷新数据';
}

function getFiltered() {
  if (currentPeriod === 'all') return allData;
  return allData.slice(-parseInt(currentPeriod));
}

function renderAll() {
  const d = getFiltered();
  const total = d.length;
  const avgPct = total ? Math.round(d.reduce((s, r) => s + r.pct, 0) / total) : 0;
  const bodyCount = d.filter(r => r.body).length;
  const inputCount = d.filter(r => r.input).length;
  const recordCount = d.filter(r => r.record).length;

  const dayDefs = [
    { key: '🧠 深度成长日', emoji: '🧠', short: '深度成长日' },
    { key: '🧩 系统管理日', emoji: '🧩', short: '系统管理日' },
    { key: '🤝 对外连接日', emoji: '🤝', short: '对外连接日' },
    { key: '🌿 低结构恢复日', emoji: '🌿', short: '低结构恢复日' },
  ];
  const dayCounts = {};
  dayDefs.forEach(dd => dayCounts[dd.key] = 0);
  d.forEach(r => { if (dayCounts[r.dayType] !== undefined) dayCounts[r.dayType]++; });

  document.getElementById('main-content').innerHTML = `
    <div class="card">
      <div class="card-label">整体概览</div>
      <div class="period-tabs">
        <button class="period-tab ${currentPeriod==='7'?'active':''}" onclick="setPeriod('7')">近7天</button>
        <button class="period-tab ${currentPeriod==='30'?'active':''}" onclick="setPeriod('30')">近30天</button>
        <button class="period-tab ${currentPeriod==='all'?'active':''}" onclick="setPeriod('all')">全部</button>
      </div>
      <div class="stat-row">
        <div class="stat-box"><div class="stat-num">${total}</div><div class="stat-label">打卡天数</div></div>
        <div class="stat-box"><div class="stat-num">${avgPct}%</div><div class="stat-label">平均完成率</div></div>
        <div class="stat-box"><div class="stat-num">${total?Math.round((bodyCount+inputCount+recordCount)/total/3*100):0}%</div><div class="stat-label">锚点坚持率</div></div>
      </div>
    </div>

    <div class="card">
      <div class="card-label">完成率趋势</div>
      <canvas id="trend-chart" height="160"></canvas>
    </div>

    <div class="card">
      <div class="card-label">三个锚点坚持情况</div>
      <div class="anchor-row">
        ${[
          { emoji: '🏃', name: '身体锚 · 运动', count: bodyCount, color: '#534AB7' },
          { emoji: '📖', name: '输入锚 · 高质量阅读', count: inputCount, color: '#1D9E75' },
          { emoji: '✏️', name: '记录锚 · 今日记录', count: recordCount, color: '#E8A020' },
        ].map(a => `
          <div class="anchor-item">
            <div class="anchor-emoji">${a.emoji}</div>
            <div class="anchor-info">
              <div class="anchor-name">${a.name}</div>
              <div class="anchor-bar-bg"><div class="anchor-bar-fill" style="width:${total?Math.round(a.count/total*100):0}%;background:${a.color};"></div></div>
              <div class="anchor-pct">${a.count} / ${total} 天 · ${total?Math.round(a.count/total*100):0}%</div>
            </div>
          </div>`).join('')}
      </div>
    </div>

    <div class="card">
      <div class="card-label">日类型分布</div>
      <div class="day-grid">
        ${dayDefs.map(dd => `
          <div class="day-tile">
            <div class="day-tile-top"><span style="font-size:16px">${dd.emoji}</span><span class="day-tile-name">${dd.short}</span></div>
            <div class="day-tile-count">${dayCounts[dd.key]}</div>
            <div class="day-tile-sub">天 · ${total?Math.round(dayCounts[dd.key]/total*100):0}%</div>
          </div>`).join('')}
      </div>
    </div>
  `;

  const labels = d.map(r => r.date.replace(/\d{4}年/, '').replace('日', '').replace(/星期./, '').trim());
  const ctx = document.getElementById('trend-chart').getContext('2d');
  const chart = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        data: d.map(r => r.pct),
        borderColor: '#534AB7',
        backgroundColor: 'rgba(83,74,183,0.08)',
        borderWidth: 2,
        pointBackgroundColor: '#534AB7',
        pointRadius: d.length > 20 ? 2 : 4,
        fill: true, tension: 0.35
      }]
    },
    options: {
      responsive: true,
      plugins: { legend: { display: false } },
      scales: {
        y: { min: 0, max: 100, ticks: { callback: v => v+'%', font: { size: 11 } }, grid: { color: '#f0ede6' } },
        x: { ticks: { font: { size: 10 }, maxRotation: 45, maxTicksLimit: 8 }, grid: { display: false } }
      }
    }
  });
  charts.push(chart);
}

function setPeriod(p) {
  currentPeriod = p;
  charts.forEach(c => c.destroy());
  charts = [];
  renderAll();
}

loadData();
</script>
</body>
</html>
